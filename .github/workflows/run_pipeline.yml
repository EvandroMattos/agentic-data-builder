name: Run Pipeline

on:
  pull_request:
    types: [closed]

jobs:
  run:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Simulate Databricks Execution
        run: |
          echo "🚀 Starting pipeline execution..."
          echo "Reading pipeline files..."
          ls pipelines || echo "No pipelines folder"
          echo "Executing pipeline..."
          python pipelines/*.py || echo "Simulation complete"
          echo "✅ Pipeline execution finished"